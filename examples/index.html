<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nira Tasks Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div class="max-w-4xl mx-auto py-12 px-4">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-bold tracking-tight text-slate-900">Nira <span class="text-indigo-600">Tasks</span></h1>
                <p class="text-slate-500 mt-2">Manage your daily goals with speed and elegance.</p>
            </div>
            <div class="h-12 w-12 rounded-2xl bg-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Form Section -->
            <div class="md:col-span-1">
                <div class="glass p-6 rounded-3xl border border-white shadow-xl">
                    <h2 class="text-xl font-semibold mb-6">Create Task</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Title</label>
                            <input id="taskTitle" type="text" placeholder="What needs to be done?" 
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none">
                        </div>
                        <button onclick="addTask()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl shadow-md transition-all transform active:scale-95">
                            Add Task
                        </button>
                    </div>
                </div>
            </div>

            <!-- List Section -->
            <div class="md:col-span-2">
                <div class="glass p-6 rounded-3xl border border-white shadow-xl min-h-[400px]">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-semibold">Current Tasks</h2>
                        <span id="taskCount" class="bg-indigo-100 text-indigo-700 text-xs font-bold px-3 py-1 rounded-full">0 TASKS</span>
                    </div>
                    <div id="taskList" class="space-y-3">
                        <!-- Tasks will be injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchTasks() {
            const res = await fetch('/api/tasks');
            const tasks = await res.json();
            renderTasks(tasks);
        }

        function renderTasks(tasks) {
            const list = document.getElementById('taskList');
            const count = document.getElementById('taskCount');
            count.innerText = `${tasks.length} TASKS`;
            
            list.innerHTML = tasks.length === 0 
                ? '<div class="text-center py-12 text-slate-400">No tasks found. Relax!</div>'
                : tasks.map(t => `
                    <div class="flex items-center justify-between p-4 rounded-2xl bg-white border border-slate-100 hover:shadow-md transition-all group">
                        <div class="flex items-center space-x-4">
                            <div class="h-6 w-6 rounded-full border-2 border-slate-200 group-hover:border-indigo-500 transition-colors"></div>
                            <span class="font-medium text-slate-700">${t.title}</span>
                        </div>
                        <button onclick="deleteTask(${t.id})" class="text-slate-300 hover:text-red-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                `).join('');
        }

        async function addTask() {
            const input = document.getElementById('taskTitle');
            if (!input.value) return;
            
            await fetch('/api/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: input.value })
            });
            
            input.value = '';
            fetchTasks();
        }

        async function deleteTask(id) {
            await fetch('/api/tasks/' + id, { method: 'DELETE' });
            fetchTasks();
        }

        // Initial fetch
        fetchTasks();
    </script>
</body>
</html>
